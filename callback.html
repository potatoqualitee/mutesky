<!DOCTYPE html>
<html>
<head>
    <title>Bluesky Auth Callback</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src https:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'">
    <meta name="referrer" content="no-referrer">
    <style>
        /* Critical theme styles to prevent flash */
        body { visibility: hidden; }
        .js-loaded { visibility: visible; }
    </style>
    <link rel="preload" href="./css/base.css" as="style">
    <link rel="preload" href="./css/callback.css" as="style">
    <script src="./js/themeInit.js"></script>
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/callback.css">
</head>
<body>
    <div class="callback-container">
        <h2>Authentication Successful</h2>
        <p class="status-text">✨ Rendering keywords<span class="loading-dots"></span></p>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <p id="error" class="error-message"></p>
        <a href="/" class="home-link">Return to app</a>
    </div>

    <script src="./js/bundle.js"></script>
    <script src="./js/callback.js"></script>
</body>
</html>
