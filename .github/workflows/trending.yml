name: Update trending controversies

on:
  schedule:
    # Four times a day, offset from the top of the hour to be polite to feeds
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trending
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Scour headlines and update muted phrases
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: node scripts/trending/update.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keywords/trending.json keywords/trending-state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update trending controversies [automated]"
            git push
          fi
